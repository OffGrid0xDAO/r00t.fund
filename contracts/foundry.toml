[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "v4-core/=lib/v4-core/src/",
    "solmate/=lib/v4-core/lib/solmate/",
]
optimizer = true
optimizer_runs = 1
via_ir = true
evm_version = "cancun"

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[rpc_endpoints]
base-sepolia = "${BASE_SEPOLIA_RPC_URL}"
base-mainnet = "${BASE_MAINNET_RPC_URL}"
ethereum = "${ETHEREUM_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"
tenderly-vnet = "${TENDERLY_VIRTUAL_TESTNET_RPC}"
# Robinhood Chain (Arbitrum Orbit L2, chainId 4663). Set ROBINHOOD_RPC_URL in
# .env (Alchemy/provider URL); public RPC is rate-limited.
robinhood = "${ROBINHOOD_RPC_URL}"
robinhood-testnet = "${ROBINHOOD_TESTNET_RPC_URL}"

[etherscan]
base-sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base-mainnet = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
ethereum = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/api" }
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
# Blockscout verification for Robinhood Chain (no API key required).
robinhood = { key = "", url = "https://robinhoodchain.blockscout.com/api", chain = 4663 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
