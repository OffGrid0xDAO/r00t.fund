<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Dark is the baseline on entry — apply before first paint to avoid a light flash -->
    <script>
      (function () {
        try { if (localStorage.getItem('theme') !== 'light') document.documentElement.classList.add('dark'); }
        catch (e) { document.documentElement.classList.add('dark'); }
      })();
    </script>

    <!-- Primary Meta Tags -->
    <title>r00t.fund — Private Launchpad for Regenerative Projects</title>
    <meta name="title" content="r00t.fund — Private Launchpad for Regenerative Projects" />
    <meta name="description" content="Fund what heals. Prove it on-chain. r00t.fund is a private launchpad where communities fund regeneration projects with ZK privacy, verified by Chainlink CRE satellite data." />
    <meta name="keywords" content="r00t.fund, regenerative finance, ReFi, carbon credits, ZK privacy, Chainlink CRE, dark pool, private launchpad, satellite verification, DeFi, web3, reforestation, zero-knowledge proofs" />
    <meta name="author" content="r00t.fund" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2d5a3d" />
    <meta name="base:app_id" content="699f3d2ef7d6e3b1e39559f8" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://r00t.fund" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://r00t.fund" />
    <meta property="og:title" content="r00t.fund — Fund What Heals. Prove It On-Chain." />
    <meta property="og:description" content="Private launchpad for regenerative projects. ZK-shielded funding, Chainlink CRE satellite verification, and carbon credits backed by real data. Not paperwork." />

    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="r00t.fund" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->

    <meta name="twitter:url" content="https://r00t.fund" />
    <meta name="twitter:title" content="r00t.fund — Fund What Heals. Prove It On-Chain." />
