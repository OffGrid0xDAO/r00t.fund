# Workflow 1: Confidential Regenerative Funding
# Prize Track: Privacy ($16k)
name: confidential-regenerative-funding
description: >
  Privacy-preserving project funding using ConfidentialHTTPClient for encrypted
  carbon credit verification, ZK commitments, and sealed-bid project launches.

triggers:
  - type: cron
    schedule: "*/5 * * * *"  # Every 5 minutes
  - type: evmLogTrigger
    contract: "${LAUNCHPAD_GOVERNANCE_ADDRESS}"
    event: "ProposalExecuted(uint256,address,uint256)"
    network: sepolia

capabilities:
  - ConfidentialHTTPClient
  - EVMClient
  - vaultDonSecrets

target:
  contract: "${CONFIDENTIAL_FUNDING_VAULT_ADDRESS}"
  network: sepolia
  function: "receiveReport"
