# Workflow 3: AI Agent Orchestration
# Prize Track: CRE & AI ($17k)
name: ai-agent-orchestration
description: >
  AI-assisted CRE workflow using ConfidentialHTTPClient for encrypted LLM calls.
  Coordinates autonomous trading agents with on-chain strategy recommendations.

triggers:
  - type: cron
    schedule: "*/5 * * * *"  # Every 5 minutes

capabilities:
  - ConfidentialHTTPClient
  - HTTPClient
  - EVMClient
  - vaultDonSecrets

target:
  contract: "${AI_AGENT_ORCHESTRATOR_ADDRESS}"
  network: sepolia
  function: "receiveReport"
