<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1500, initial-scale=1" />
<title>r00t.fund — X / Twitter banner (1500×500)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0B0D0A;
    --bg-2: #121210;
    --border: rgba(255,255,255,0.10);
    --text: #F5F5F3;
    --text-2: #A8A8A4;
    --text-3: #6C6C68;
    --lime: #D6FE51;
    --ink: #10140A;
    --display: 'Newsreader', Georgia, serif;
    --body: 'Inter', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #0B0D0A;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
  }

  /* ── The exact X/Twitter banner canvas ───────────────────────────── */
  .banner {
    position: relative;
    width: 1500px;
    height: 500px;
    overflow: hidden;
    background: #0B0D0A;
    color: var(--text);
    isolation: isolate;
  }

  /* ── cinematic terrain — big, near full-bleed, the hero of the banner ── */
  .terrain {
    position: absolute; inset: 0;
    background: url('pilot-terrain.png') 22% 44% / 150% no-repeat;
    filter: brightness(1.15) saturate(1.12) contrast(1.05);
    z-index: 0;
    /* soften the outer edges so it melts into the dark; weighted to the right */
    -webkit-mask-image: radial-gradient(ellipse 88% 98% at 70% 48%, #000 60%, transparent 100%);
            mask-image: radial-gradient(ellipse 88% 98% at 70% 48%, #000 60%, transparent 100%);
  }
  /* lime bloom rising off the ridge */
  .terrain-glow {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 44% 52% at 70% 42%, rgba(214,254,81,0.13) 0%, transparent 62%);
  }
  /* left scrim — just enough dark to seat the logo + line, keeps it abstract */
  .scrim {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background:
      linear-gradient(90deg, #0B0D0A 0%, rgba(11,13,10,0.92) 20%, rgba(11,13,10,0.55) 38%, transparent 60%),
      linear-gradient(180deg, rgba(11,13,10,0.7) 0%, transparent 26%);
  }

  /* content sits TOP-left, clear of the profile avatar (bottom-left) */
  .content {
    position: absolute; z-index: 2;
    top: 56px; left: 92px;
    max-width: 620px;
  }

  .brandrow { display: flex; align-items: center; gap: 13px; margin-bottom: 26px; }
  .wordmark {
    font-family: var(--display);
    font-size: 34px; font-weight: 500; letter-spacing: -0.02em;
    color: var(--text); line-height: 1;
  }
  .wordmark .dot { color: var(--lime); }
  .rootmark { color: var(--lime); display: inline-flex; filter: drop-shadow(0 0 12px rgba(214,254,81,0.4)); }

  .chip {
    display: inline-block;
    font-family: var(--mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--ink); background: var(--lime);
    padding: 6px 12px; border-radius: 8px; font-weight: 500;
    margin-bottom: 20px;
  }

  h1 {
    font-family: var(--display); font-weight: 400;
    font-size: 80px; line-height: 1.0; letter-spacing: -0.025em;
    color: var(--text);
  }
  h1 .accent { color: var(--lime); font-style: italic; }

  /* small "built on Robinhood Chain" chip, top-right over the terrain */
  .rh {
    position: absolute; z-index: 2; top: 60px; right: 40px;
    display: inline-flex; align-items: center; gap: 9px;
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid rgba(214,254,81,0.25);
    background: rgba(11,13,10,0.55); backdrop-filter: blur(6px);
    color: var(--lime);
  }
  .rh .feather { display: inline-flex; filter: drop-shadow(0 0 6px rgba(214,254,81,0.35)); }
  .rh .rh-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-3); }
  .rh .rh-text { font-family: var(--display); font-size: 15px; letter-spacing: -0.01em; }

  /* screenshot helper (not exported) */
  .hint {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    font-family: var(--mono); font-size: 12px; color: #9c9c96;
    background: #000; padding: 8px 14px; border-radius: 999px; border: 1px solid #333; z-index: 99;
  }
  @media print { .hint { display: none; } }
</style>
</head>

      <span class="chip">RWA ReFi launchpad</span>

      <h1 id="headline">From Degens<br /><span class="accent">to ReGens.</span></h1>
    </div>
  </div>

  <script>
    window.saveBanner = function () {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      s.onload = function () {
        html2canvas(document.getElementById('banner'), { scale: 2, backgroundColor: null, useCORS: true }).then(function (canvas) {
          var a = document.createElement('a');
          a.download = 'r00t-twitter-banner-1500x500.png';
          a.href = canvas.toDataURL('image/png');
          a.click();
        });
      };
      document.body.appendChild(s);
    };
  </script>
</body>
</html>
